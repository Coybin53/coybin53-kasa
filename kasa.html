<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kasa Sklepowa - Pełny System</title>
    <!-- SKANER KODÓW KRESKOWYCH (DŁUGICH) I QR -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- SIEĆ BEZPRZEWODOWA -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f3f5; margin: 0; padding: 20px; display: flex; gap: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex: 1; }
        #reader { width: 100%; max-width: 380px; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 0; }
        button { padding: 12px; margin: 6px 0; width: 100%; box-sizing: border-box; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-pay { background: #3498db; color: white; }
        .btn-pay:hover { background: #2980b9; }
        .btn-add { background: #9b59b6; color: white; }
        .btn-add:hover { background: #8e44ad; }
        .btn-clear { background: #95a5a6; color: white; }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; }
        #total { font-size: 26px; font-weight: bold; color: #e74c3c; text-align: right; margin: 20px 0; }
        .pin-display { font-size: 32px; font-weight: bold; color: #2c3e50; letter-spacing: 4px; background: #e2e8f0; padding: 10px; border-radius: 8px; text-align: center; margin: 10px 0; border: 2px dashed #cbd5e1; }
        .status-badge { padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .disconnected { background: #fde8e8; color: #e74c3c; }
        .connected { background: #def7ec; color: #03543f; }
        
        /* OKIENKO MODALNE W RAMACH TEJ SAMEJ STRONY */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background: #34495e; color: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); box-sizing: border-box; }
        .modal-content h3 { margin-top: 0; color: #2ecc71; text-align: center; }
        .modal-content label { font-size: 13px; color: #bdc3c7; display: block; margin-top: 10px; }
        .modal-content input { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; border: none; border-radius: 6px; font-size: 15px; }
        .btn-save { background: #2ecc71; color: white; }
        .btn-save:hover { background: #27ae60; }
        .btn-close { background: #e74c3c; color: white; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Skaner Kodów Towarów</h2>
        <!-- Tutaj uruchomi się kamera na laptopie -->
        <div id="reader"></div>
        <p style="color: #64748b; font-size: 13px;">Zbliż dowolny (krótki lub długi) kod kreskowy z produktu.</p>
        <button class="btn-add" onclick="toggleModal(true)">➕ Otwórz panel dodawania produktów</button>
    </div>

    <div class="box">
        <h2>Połączenie z Terminalem</h2>
        <div id="conn-status" class="status-badge disconnected">Brak połączenia z telefonem</div>
        <p style="color: #64748b; margin: 0; font-size: 13px;">Wpisz ten PIN na telefonie, aby go sparować:</p>
        <div id="pin-box" class="pin-display">Ładowanie...</div>

        <h2>Aktualny Paragon</h2>
        <div id="cart-items"></div>
        <div id="total">Suma: 0.00 zł</div>
        
        <button id="pay-btn" class="btn-pay" onclick="sendPaymentToTerminal()" disabled>
            Wyślij do Terminala (Czeka na połączenie)
        </button>
        <button class="btn-clear" onclick="clearCart()">Wyczyść koszyk</button>
    </div>

    <!-- PANEL WPISYWANIA NOWYCH PRODUKTÓW (NP. DŁUGICH KODÓW EAN-13) -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <h3>ZAPISZ PRODUKT W BAZIE</h3>
            
            <label>Kod kreskowy (wpisz cyfry z produktu, mogą być bardzo długie):</label>
            <input type="text" id="modal-kod" placeholder="Np. 5901234567890">

            <label>Nazwa produktu:</label>
            <input type="text" id="modal-nazwa" placeholder="Np. Chipsy, Cola">

            <label>Cena w zł:</label>
            <input type="number" step="0.01" id="modal-cena" placeholder="Np. 6.50">
            
            <button class="btn-save" onclick="zapiszProduktZModala()">Zapisz produkt w bazie</button>
            <button class="btn-close" onclick="toggleModal(false)">Zamknij panel</button>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;
        let conn = null;

        // Generowanie PINu parowania sieciowego
        const prostyPin = Math.floor(1000 + Math.random() * 9000).toString();
        const peer = new Peer('coybin-kasa-' + prostyPin);

        peer.on('open', () => {
            document.getElementById('pin-box').innerText = prostyPin;
        });

        peer.on('connection', (connection) => {
            conn = connection;
            document.getElementById('conn-status').innerText = "POŁĄCZONO Z TERMINALEM";
            document.getElementById('conn-status').className = "status-badge connected";
            document.getElementById('pay-btn').removeAttribute('disabled');
            document.getElementById('pay-btn').innerText = "Zapłać kartą (Wyślij kwotę)";

            conn.on('data', (data) => {
                if (data === "PAYMENT_SUCCESS") {
                    alert("KASA: Płatność zatwierdzona przez terminal!");
                    clearCart();
                }
            });
        });

        function updateCartDisplay() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            total = 0;
            cart.forEach(item => {
                total += item.price;
                container.innerHTML += `<div class="item"><span>${item.name}</span><span>${item.price.toFixed(2)} zł</span></div>`;
            });
            document.getElementById('total').innerText = `Suma: ${total.toFixed(2)} zł`;
        }

        function clearCart() {
            cart = [];
            updateCartDisplay();
        }

        function toggleModal(show) {
            document.getElementById('product-modal').style.display = show ? 'flex' : 'none';
        }

        function zapiszProduktZModala() {
            const kod = document.getElementById('modal-kod').value.trim().toLowerCase();
            const nazwa = document.getElementById('modal-nazwa').value.trim();
            const cena = parseFloat(document.getElementById('modal-cena').value);

            if (!kod || !nazwa || isNaN(cena)) {
                alert("Wypełnij poprawnie wszystkie pola!");
                return;
            }

            let database = JSON.parse(localStorage.getItem('baza_produktow')) || {};
            database[kod] = { name: nazwa, price: cena };
            localStorage.setItem('baza_produktow', JSON.stringify(database));

            alert(`Dodano do bazy: ${nazwa} pod kodem ${kod}`);
            
            document.getElementById('modal-kod').value = '';
            document.getElementById('modal-nazwa').value = '';
            document.getElementById('modal-cena').value = '';
            toggleModal(false);
        }

        // SILNIK SKANERA - OBSŁUGUJE DŁUGIE KODY KRESKOWE
        let lastScannedCode = "";
        let lastScanTime = 0;

        function onScanSuccess(decodedText) {
            const now = Date.now();
            const cleanCode = decodedText.trim().toLowerCase();
            
            if (cleanCode === lastScannedCode && (now - lastScanTime) < 2500) return;
            
            lastScannedCode = cleanCode;
            lastScanTime = now;

            let database = JSON.parse(localStorage.getItem('baza_produktow')) || {};

            // Jeśli przeskanowany długi kod jest w bazie -> wrzuć na paragon
            if (database[cleanCode]) {
                cart.push(database[cleanCode]);
                updateCartDisplay();
                new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav').play();
            } else {
                console.log("Nieznany kod kreskowy: " + cleanCode);
            }
        }

        // Konfiguracja pod kody kreskowe (szerokie i długie)
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 20, 
            qrbox: { width: 320, height: 160 }, // Kształt idealny pod paski kodu kreskowego
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.QR_CODE,
                Html5QrcodeSupportedFormats.EAN_13, // Standardowe długie kody (13 cyfr)
                Html5QrcodeSupportedFormats.EAN_8,  // Krótsze kody (8 cyfr)
                Html5QrcodeSupportedFormats.CODE_128
            ]
        });
        html5QrcodeScanner.render(onScanSuccess);

        function sendPaymentToTerminal() {
            if(total === 0) return alert("Koszyk jest pusty!");
            if (conn && conn.open) {
                conn.send({ action: "START_PAYMENT", amount: total.toFixed(2) });
            }
        }
    </script>
</body>
</html>
