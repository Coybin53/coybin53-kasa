
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kasa Sklepowa - Serce Systemu</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f3f5; margin: 0; padding: 20px; display: flex; gap: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex: 1; }
        #reader { width: 100%; max-width: 380px; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 0; }
        input, button { padding: 12px; margin: 6px 0; width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        button { background: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #27ae60; }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; }
        #total { font-size: 26px; font-weight: bold; color: #e74c3c; text-align: right; margin: 20px 0; }
        .status-badge { padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .disconnected { background: #fde8e8; color: #e74c3c; }
        .connected { background: #def7ec; color: #03543f; }
        #pairing-section { text-align: center; padding: 15px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Skaner QR (Kamera Laptopa)</h2>
        <div id="reader"></div>
        <h3>Dodaj produkt do pamięci</h3>
        <input type="text" id="p-name" placeholder="Nazwa produktu">
        <input type="number" step="0.01" id="p-price" placeholder="Cena">
        <button onclick="addTemplate()">Zapisz produkt</button>
    </div>
    <div class="box">
        <h2>Połączenie z Terminalem</h2>
        <div id="conn-status" class="status-badge disconnected">Brak połączenia z terminalem</div>
        <div id="pairing-section">
            <p style="margin: 0 0 10px 0; color: #64748b;">Zeskanuj ten kod telefonem na starcie:</p>
            <img id="pairing-qr" src="" alt="Kod parowania">
        </div>
        <h2>Aktualny Paragon</h2>
        <div id="cart-items"></div>
        <div id="total">Suma: 0.00 zł</div>
        <button id="pay-btn" style="background: #3498db; font-size: 16px;" onclick="sendPaymentToTerminal()" disabled>Zapłać kartą</button>
        <button style="background: #95a5a6; margin-top: 5px;" onclick="clearCart()">Wyczyść koszyk</button>
    </div>
    <script>
        const productDatabase = { "mleko": { name: "Mleko 3.2%", price: 4.50 }, "chleb": { name: "Chleb", price: 5.20 } };
        let cart = []; let total = 0; let conn = null;
        const kasaId = 'kasa-' + Math.random().toString(36).substring(2, 9);
        const peer = new Peer(kasaId);
        peer.on('open', (id) => { document.getElementById('pairing-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${id}`; });
        peer.on('connection', (connection) => { conn = connection; setupConnection(); });
        function setupConnection() {
            document.getElementById('conn-status').innerText = "POŁĄCZONO Z TERMINALEM";
            document.getElementById('conn-status').className = "status-badge connected";
            document.getElementById('pairing-section').style.display = "none";
            document.getElementById('pay-btn').removeAttribute('disabled');
            conn.on('data', (data) => { if (data === "PAYMENT_SUCCESS") { alert("Płatność zatwierdzona!"); clearCart(); } });
        }
        function addTemplate() {
            const name = document.getElementById('p-name').value; const price = parseFloat(document.getElementById('p-price').value);
            if(name && price) { const code = name.toLowerCase().replace(/\s+/g, ''); productDatabase[code] = { name, price }; alert("Dodano!"); }
        }
        function updateCartDisplay() {
            const container = document.getElementById('cart-items'); container.innerHTML = ''; total = 0;
            cart.forEach(item => { total += item.price; container.innerHTML += `<div class="item"><span>${item.name}</span><span>${item.price.toFixed(2)} zł</span></div>`; });
            document.getElementById('total').innerText = `Suma: ${total.toFixed(2)} zł`;
        }
        function clearCart() { cart = []; updateCartDisplay(); }
        let lastScannedCode = ""; let lastScanTime = 0;
        function onScanSuccess(decodedText) {
            const now = Date.now(); const cleanCode = decodedText.trim().toLowerCase();
            if (cleanCode === lastScannedCode && (now - lastScanTime) < 2500) return;
            if (productDatabase[cleanCode]) {
                lastScannedCode = cleanCode; lastScanTime = now; cart.push(productDatabase[cleanCode]); updateCartDisplay();
            }
        }
        new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }).render(onScanSuccess);
        function sendPaymentToTerminal() {
            if(total === 0) return alert("Pusty koszyk!");
            if (conn && conn.open) conn.send({ action: "START_PAYMENT", amount: total.toFixed(2) });
        }
    </script>
</body>
</html>
